<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 3 membuat sistem pemesanan toko</title>
</head>

<body>
    <script>
        // 1. Inisialisasi array produkToko
        let produkToko = [
            { id: 1, nama: "Laptop", harga: 7000000, stok: 5 },
            { id: 2, nama: "Mouse", harga: 200000, stok: 10 },
            { id: 3, nama: "Keyboard", harga: 350000, stok: 7 }
        ];

        // 2. Fungsi untuk menambahkan produk baru
        function tambahProduk(nama, harga, stok) {
            // Membuat ID otomatis berdasarkan ID terakhir + 1
            const newId = produkToko.length > 0 ? produkToko[produkToko.length - 1].id + 1 : 1;

            const produkBaru = {
                id: newId,
                nama: nama,
                harga: harga,
                stok: stok
            };

            produkToko.push(produkBaru);
            console.log(`✅ Produk "${nama}" berhasil ditambahkan.`);
        }

        // 3. Fungsi untuk menghapus produk berdasarkan ID
        function hapusProduk(id) {
            const index = produkToko.findIndex(p => p.id === id);

            if (index !== -1) {
                const namaProduk = produkToko[index].nama;
                produkToko.splice(index, 1);
                console.log(`🗑️ Produk "${namaProduk}" (ID: ${id}) telah dihapus.`);
            } else {
                console.log(`❌ Produk dengan ID ${id} tidak ditemukan.`);
            }
        }

        // 4. Fungsi untuk menampilkan daftar produk
        function tampilkanProduk() {
            console.log("--- DAFTAR PRODUK TOKO ---");
            if (produkToko.length === 0) {
                console.log("Stok kosong.");
            } else {
                produkToko.forEach((produk) => {
                    console.log(`ID: ${produk.id} | Nama: ${produk.nama} | Harga: Rp${produk.harga.toLocaleString()} | Stok: ${produk.stok}`);
                });
            }
            console.log("--------------------------");
        }

        // --- PENGUJIAN SISTEM ---
        tampilkanProduk();
        tambahProduk("Monitor", 1500000, 4);
        tampilkanProduk();
        hapusProduk(2); // Menghapus Mouse
        tampilkanProduk();
    </script>
</body>

</html>
