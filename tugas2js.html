<!DOCTYPE html>
<html lang="en">

<head>
    <title>Tugas 2 Javascript</title>
</head>

<body>

    <h2>Data Pegawai</h2>

    <script>
        // Data Pegawai
        let nama = "Dodi Prayodi";
        let umur = 25;
        let jabatan = "Manajer";
        let status = "Menikah";

        // Gaji Pokok (if)
        let gapok;
        if (jabatan == "Manajer") {
            gapok = 15000000;
        } else if (jabatan == "Asisten Manajer") {
            gapok = 10000000;
        } else {
            gapok = 5000000;
        }

        // Tunjangan Jabatan
        let tunjanganJabatan = 0.15 * gapok;

        // BPJS
        let bpjs = 0.10 * gapok;

        // Tunjangan Keluarga (ternary)
        let tunjanganKeluarga = (status == "Menikah") ? 0.20 * gapok : 0;

        // Total Gaji
        let totalGaji = gapok + tunjanganJabatan + bpjs + tunjanganKeluarga;

        // Tampilkan dalam tabel
        document.write(`
        <table border="1" cellpadding="10">
            <thead>
                <tr>
                    <th>Nama Pegawai</th>
                    <th>Umur</th>
                    <th>Jabatan</th>
                    <th>Status</th>
                    <th>Gaji Pokok</th>
                    <th>Tunjangan Jabatan</th>
                    <th>BPJS</th>
                    <th>Tunjangan Keluarga</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>${nama}</td>
                    <td>${umur}</td>
                    <td>${jabatan}</td>
                    <td>${status}</td>
                    <td>${gapok}</td>
                    <td>${tunjanganJabatan}</td>
                    <td>${bpjs}</td>
                    <td>${tunjanganKeluarga}</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <th colspan="7">Total Gaji</th>
                    <th>${totalGaji}</th>
                </tr>
            </tfoot>
        </table>
    `);
    </script>

</body>

</html>
